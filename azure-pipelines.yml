trigger:
  branches:
    include:
      - main
      - develop
      - feature/ci-cd

pool:
  vmImage: 'ubuntu-latest'

variables:
  - name: NODE_VERSION
    value: '18.x'

stages:
- stage: Build
  jobs:
  - job: BuildApp
    steps:
    - task: NodeTool@0
      inputs:
        versionSpec: $(NODE_VERSION)
      displayName: 'Install Node.js'

    - script: |
        npm install -g eas-cli
        npm install
      displayName: 'Install dependencies'

    - task: DownloadSecureFile@1
      name: keystoreFile
      inputs:
        secureFile: 'my-upload-key.keystore'
      displayName: 'Download Keystore file'

    - script: |
        mkdir -p android/app
        cp $(keystoreFile.secureFilePath) android/app/my-upload-key.keystore
      displayName: 'Copy keystore'

    - script: |
        echo "EXPO_TOKEN=$(EXPO_TOKEN)" >> .env
        echo "ANDROID_KEYSTORE_PASSWORD=$(ANDROID_KEYSTORE_PASSWORD)" >> .env
        echo "ANDROID_KEY_ALIAS=$(ANDROID_KEY_ALIAS)" >> .env
        echo "ANDROID_KEY_PASSWORD=$(ANDROID_KEY_PASSWORD)" >> .env
      displayName: 'Set up environment variables'
      env:
        EXPO_TOKEN: $(EXPO_TOKEN)
        ANDROID_KEYSTORE_PASSWORD: $(ANDROID_KEYSTORE_PASSWORD)
        ANDROID_KEY_ALIAS: $(ANDROID_KEY_ALIAS)
        ANDROID_KEY_PASSWORD: $(ANDROID_KEY_PASSWORD)

    - script: |
        eas build --platform android --profile preview --non-interactive --no-wait
      displayName: 'Build Android App Bundle for Internal Testing'
      condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/feature/ci-cd'))

    - script: |
        eas build --platform android --profile preview --non-interactive --no-wait
      displayName: 'Build Android App Bundle for Internal Testing'
      condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/develop'))

    - script: |
        eas build --platform android --profile production --non-interactive --no-wait
      displayName: 'Build Android APK for Production'
      condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
