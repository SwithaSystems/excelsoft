trigger:
  branches:
    include:
      - main
  paths:
    exclude:
      - '**/*.md'

pool:
  vmImage: 'ubuntu-latest'

variables:
  - group: expo-variables
  NODE_VERSION: '18.x'
  EXPO_CLI_VERSION: '6.3.10'

stages:
- stage: Build
  jobs:
  - job: BuildApp
    steps:
    - task: NodeTool@0
      inputs:
        versionSpec: $(NODE_VERSION)
      displayName: 'Install Node.js'

    - script: |
        npm install -g eas-cli@latest
        npm install -g expo-cli@$(EXPO_CLI_VERSION)
      displayName: 'Install EAS CLI and Expo CLI'

    - script: |
        npm install
      displayName: 'Install dependencies'
      
    - script: |
        npx eas-cli build --platform android --profile preview --non-interactive
      displayName: 'Build Android APK (Internal Testing)'
      env:
        EXPO_TOKEN: $(EXPO_ACCESS_TOKEN)

    - script: |
        npx eas-cli build --platform android --profile production --non-interactive
      displayName: 'Build Android AAB (Production)'
      env:
        EXPO_TOKEN: $(EXPO_ACCESS_TOKEN)

    - script: |
        mkdir -p $(System.DefaultWorkingDirectory)/dist
        echo "Build URLs can be found in the build logs above" > $(System.DefaultWorkingDirectory)/dist/build-info.txt
      displayName: 'Create Build Info'

    - task: PublishBuildArtifacts@1
      inputs:
        pathToPublish: '$(System.DefaultWorkingDirectory)/dist'
        artifactName: 'build-info'
        publishLocation: 'Container'
      displayName: 'Publish Build Info'
      condition: succeededOrFailed()
