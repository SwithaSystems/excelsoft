trigger:
  branches:
    include:
      - main
  paths:
    exclude:
      - '**/*.md'

pool:
  vmImage: 'ubuntu-latest'

variables:
  - group: ExpoConfig
  - name: NODE_VERSION
    value: '18.x'
  - name: EXPO_CLI_VERSION
    value: '6.3.10'

stages:
- stage: Build
  jobs:
  - job: BuildApp
    displayName: 'Build Android Apps'
    steps:
    - task: NodeTool@0
      inputs:
        versionSpec: $(NODE_VERSION)
      displayName: 'Install Node.js'

    - script: |
        npm install -g eas-cli@latest
        npm install -g expo-cli@$(EXPO_CLI_VERSION)
      displayName: 'Install EAS CLI and Expo CLI'

    - script: |
        npm install
      displayName: 'Install Dependencies'

    - task: DownloadSecureFile@1
      name: keystorefile
      displayName: 'Download Keystore'
      inputs:
        secureFile: 'keystore.jks'

    - script: |
        # Create credentials directory
        mkdir -p credentials/android
        # Copy the keystore to the correct location
        cp $(keystorefile.secureFilePath) credentials/android/keystore.jks
      displayName: 'Setup Android Credentials'
      
    - script: |
        eas build --platform android --profile preview --non-interactive --local
      displayName: 'Build Android APK (Internal Testing)'
      env:
        EXPO_TOKEN: $(EXPO_ACCESS_TOKEN)
        ANDROID_KEYSTORE_PATH: credentials/android/keystore.jks
        ANDROID_KEYSTORE_ALIAS: $(EXPO_ANDROID_KEYSTORE_ALIAS)
        ANDROID_KEYSTORE_PASSWORD: $(EXPO_ANDROID_KEYSTORE_PASSWORD)
        ANDROID_KEY_PASSWORD: $(EXPO_ANDROID_KEY_PASSWORD)

    - script: |
        eas build --platform android --profile production --non-interactive --local
      displayName: 'Build Android AAB (Production)'
      env:
        EXPO_TOKEN: $(EXPO_ACCESS_TOKEN)
        ANDROID_KEYSTORE_PATH: credentials/android/keystore.jks
        ANDROID_KEYSTORE_ALIAS: $(EXPO_ANDROID_KEYSTORE_ALIAS)
        ANDROID_KEYSTORE_PASSWORD: $(EXPO_ANDROID_KEYSTORE_PASSWORD)
        ANDROID_KEY_PASSWORD: $(EXPO_ANDROID_KEY_PASSWORD)

    - script: |
        mkdir -p $(System.DefaultWorkingDirectory)/dist
        echo "Build URLs can be found in the build logs above" > $(System.DefaultWorkingDirectory)/dist/build-info.txt
      displayName: 'Create Build Info'

    - task: PublishBuildArtifacts@1
      inputs:
        pathToPublish: '$(System.DefaultWorkingDirectory)/dist'
        artifactName: 'build-info'
        publishLocation: 'Container'
      displayName: 'Publish Build Info'
      condition: succeededOrFailed()