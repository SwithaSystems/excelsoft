trigger:
  branches:
    include:
      - main
      - develop
      - feature/ci-cd

pool:
  vmImage: 'ubuntu-latest'

variables:
  - name: NODE_VERSION
    value: '18.x'

stages:
- stage: Build
  jobs:
  - job: BuildApp
    steps:
    - task: NodeTool@0
      inputs:
        versionSpec: $(NODE_VERSION)
      displayName: 'Install Node.js'

    - script: |
        npm install -g eas-cli
        npm install
      displayName: 'Install dependencies'

    - task: DownloadSecureFile@1
      name: keystoreFile
      inputs:
        secureFile: 'my-upload-key.keystore'
      displayName: 'Download Keystore file'

    - script: |
        mkdir -p android/app
        cp $(keystoreFile.secureFilePath) android/app/my-upload-key.keystore
        chmod +x android/app/my-upload-key.keystore
      displayName: 'Copy keystore'

    # Create environment files
    - script: |
        # Create .env file
        touch .env
        echo "EXPO_TOKEN=$(EXPO_TOKEN)" >> .env
        echo "ANDROID_KEYSTORE_PASSWORD=$(ANDROID_KEYSTORE_PASSWORD)" >> .env
        echo "ANDROID_KEY_ALIAS=$(ANDROID_KEY_ALIAS)" >> .env
        echo "ANDROID_KEY_PASSWORD=$(ANDROID_KEY_PASSWORD)" >> .env

        # Create eas.env file
        touch eas.env
        echo "ANDROID_KEYSTORE_PATH=android/app/my-upload-key.keystore" >> eas.env
        echo "ANDROID_KEY_ALIAS=my-excelsoft-alias" >> eas.env
      displayName: 'Create environment files'

    # Verify Expo login
    - script: |
        export EXPO_TOKEN=$(EXPO_TOKEN)
        npx eas whoami
      displayName: 'Verify Expo login'
      env:
        EXPO_TOKEN: $(EXPO_TOKEN)

    # Build AAB (Internal Testing) for feature/ci-cd branch
    - script: |
        export EXPO_TOKEN=$(EXPO_TOKEN)
        export ANDROID_KEYSTORE_PASSWORD=$(ANDROID_KEYSTORE_PASSWORD)
        export ANDROID_KEY_ALIAS=$(ANDROID_KEY_ALIAS)
        export ANDROID_KEY_PASSWORD=$(ANDROID_KEY_PASSWORD)
        printf 'y\ny\n' | eas build --platform android --profile preview --non-interactive --no-wait
      displayName: 'Build Android App Bundle for Internal Testing'
      condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/feature/ci-cd'))
      env:
        EXPO_TOKEN: $(EXPO_TOKEN)
        ANDROID_KEYSTORE_PASSWORD: $(ANDROID_KEYSTORE_PASSWORD)
        ANDROID_KEY_ALIAS: $(ANDROID_KEY_ALIAS)
        ANDROID_KEY_PASSWORD: $(ANDROID_KEY_PASSWORD)

    # Build AAB (Internal Testing) for develop branch
    - script: |
        export EXPO_TOKEN=$(EXPO_TOKEN)
        export ANDROID_KEYSTORE_PASSWORD=$(ANDROID_KEYSTORE_PASSWORD)
        export ANDROID_KEY_ALIAS=$(ANDROID_KEY_ALIAS)
        export ANDROID_KEY_PASSWORD=$(ANDROID_KEY_PASSWORD)
        printf 'y\ny\n' | eas build --platform android --profile preview --non-interactive --no-wait
      displayName: 'Build Android App Bundle for Internal Testing'
      condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/develop'))
      env:
        EXPO_TOKEN: $(EXPO_TOKEN)
        ANDROID_KEYSTORE_PASSWORD: $(ANDROID_KEYSTORE_PASSWORD)
        ANDROID_KEY_ALIAS: $(ANDROID_KEY_ALIAS)
        ANDROID_KEY_PASSWORD: $(ANDROID_KEY_PASSWORD)

    # Build APK (Production) for main branch
    - script: |
        export EXPO_TOKEN=$(EXPO_TOKEN)
        export ANDROID_KEYSTORE_PASSWORD=$(ANDROID_KEYSTORE_PASSWORD)
        export ANDROID_KEY_ALIAS=$(ANDROID_KEY_ALIAS)
        export ANDROID_KEY_PASSWORD=$(ANDROID_KEY_PASSWORD)
        printf 'y\ny\n' | eas build --platform android --profile production --non-interactive --no-wait
      displayName: 'Build Android APK for Production'
      condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
      env:
        EXPO_TOKEN: $(EXPO_TOKEN)
        ANDROID_KEYSTORE_PASSWORD: $(ANDROID_KEYSTORE_PASSWORD)
        ANDROID_KEY_ALIAS: $(ANDROID_KEY_ALIAS)
        ANDROID_KEY_PASSWORD: $(ANDROID_KEY_PASSWORD)
