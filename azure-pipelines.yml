trigger:
  branches:
    include:
      - main
      - development
      - feature/ci-cd

pool:
  vmImage: 'ubuntu-latest'

variables:
  - name: NODE_VERSION
    value: '18.x'

stages:
- stage: Build
  jobs:
  - job: BuildApp
    steps:
    - task: NodeTool@0
      inputs:
        versionSpec: $(NODE_VERSION)
      displayName: 'Install Node.js'

    - script: |
        npm install -g eas-cli
        npm install
      displayName: 'Install dependencies'

    - task: DownloadSecureFile@1
      name: keystoreFile
      inputs:
        secureFile: 'my-upload-key.keystore'
      displayName: 'Download Keystore file'

    - script: |
        mkdir -p android/app
        cp $(keystoreFile.secureFilePath) android/app/my-upload-key.keystore
        chmod +x android/app/my-upload-key.keystore
      displayName: 'Copy keystore'

    # Create credentials.json
    - script: |
        echo '{
          "android": {
            "keystore": {
              "keystorePath": "android/app/my-upload-key.keystore",
              "keystorePassword": "$(ANDROID_KEYSTORE_PASSWORD)",
              "keyAlias": "$(ANDROID_KEY_ALIAS)",
              "keyPassword": "$(ANDROID_KEY_PASSWORD)"
            }
          }
        }' > credentials.json
      displayName: 'Create credentials.json'

    # Initialize EAS project
    - script: |
        export EXPO_TOKEN=$(EXPO_TOKEN)
        echo "Initializing EAS project..."
        yes | eas init --non-interactive || true
        
        # Configure EAS project
        echo "Configuring EAS project..."
        eas update:configure
        
        # Clean any existing build artifacts
        echo "Cleaning build artifacts..."
        rm -rf android/app/build
        
        # Start build with detailed logging
        echo "Starting EAS build..."
        eas build --platform android --profile production --non-interactive --no-wait || {
          echo "Build failed. Checking logs..."
          eas build:list --status errored --limit 1 --json
          exit 1
        }
        
        # Wait for build to complete and download artifact
        echo "Waiting for build to complete..."
        BUILD_ID=$(eas build:list --status in-progress --limit 1 --json | jq -r '.[0].id')
        eas build:wait --id $BUILD_ID
        
        # Download the artifact
        echo "Downloading build artifact..."
        ARTIFACT_URL=$(eas build:list --id $BUILD_ID --json | jq -r '.[0].artifacts.buildUrl')
        echo "##vso[task.setvariable variable=artifactUrl]$ARTIFACT_URL"
        
        if [ -n "$ARTIFACT_URL" ]; then
          curl -L -o app-release.aab "$ARTIFACT_URL"
          echo "Build artifact downloaded successfully"
        else
          echo "Failed to get artifact URL"
          exit 1
        fi
      displayName: 'Build and Download Android App Bundle'
      env:
        EXPO_TOKEN: $(EXPO_TOKEN)
        ANDROID_KEYSTORE_PASSWORD: $(ANDROID_KEYSTORE_PASSWORD)
        ANDROID_KEY_ALIAS: $(ANDROID_KEY_ALIAS)
        ANDROID_KEY_PASSWORD: $(ANDROID_KEY_PASSWORD)

    # Upload the build artifact
    - task: PublishBuildArtifacts@1
      inputs:
        pathToPublish: 'app-release.aab'
        artifactName: 'android-app-bundle'
        publishLocation: 'Container'
      displayName: 'Publish Build Artifacts'
